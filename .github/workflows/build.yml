name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Gradle wrapper executable
      run: chmod +x gradlew

    - name: Show Gradle version
      run: ./gradlew --version

    - name: Build with Gradle
      run: |
        ./gradlew clean assembleDebug --no-daemon --info 2>&1 | tee gradle-output.log
        echo "=== Gradle Exit Code: $? ==="

    - name: Show all build outputs
      run: |
        echo "=== Contents of app/build ==="
        find app/build -type f -name "*.apk" 2>/dev/null
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"

    - name: Show gradle output log
      if: success() || failure()
      run: |
        echo "=== Last 50 lines of Gradle output ==="
        tail -50 gradle-output.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30