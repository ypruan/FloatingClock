name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make Gradle wrapper executable
      run: chmod +x gradlew

    - name: Show environment
      run: |
        echo "=== Java version ==="
        java -version
        echo ""
        echo "=== ANDROID_HOME ==="
        echo $ANDROID_HOME
        ls -la $ANDROID_HOME

    - name: Build with Gradle
      run: |
        echo "=== Starting build ==="
        ./gradlew clean assembleDebug --no-daemon --stacktrace --console=plain
        EXIT_CODE=$?
        echo "=== Build exit code: $EXIT_CODE ==="
        if [ $EXIT_CODE -ne 0 ]; then
          echo "BUILD FAILED with exit code $EXIT_CODE"
          exit 1
        fi
        echo "Build completed"

    - name: Check build output directory
      run: |
        echo "=== Checking app/build ==="
        if [ -d "app/build" ]; then
          echo "app/build EXISTS"
          ls -la app/build/
          echo ""
          echo "=== Checking outputs ==="
          find app/build/outputs -type f 2>/dev/null || echo "No outputs found"
        else
          echo "app/build directory DOES NOT EXIST!"
          echo "This means the build did not complete!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/
        retention-days: 30